<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FilmTrack — Roll Matcher</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #131313;
  --surface:  #1e1e1e;
  --surface2: #272727;
  --border:   #333;
  --accent:   #c8a84b;
  --text:     #e0e0e0;
  --text2:    #888;
  --red:      #e05252;
  --radius:   6px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ── top bar ──────────────────────────────────────────────────────────────── */
.topbar {
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
}
.topbar-inner { display: flex; align-items: center; gap: 10px; }
.logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--accent);
  text-transform: uppercase;
}
.topbar-sub { color: var(--text2); font-size: 13px; }
.topbar-sep { color: var(--border); }

/* ── roll header ──────────────────────────────────────────────────────────── */
.roll-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin: 20px 0 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
}
.roll-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.roll-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  color: var(--text2);
  font-size: 13px;
}
.match-count {
  text-align: right;
  flex-shrink: 0;
}
.match-count .num { font-size: 28px; font-weight: 700; color: var(--accent); line-height: 1; }
.match-count .lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* ── upload zone ──────────────────────────────────────────────────────────── */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 14px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(200,168,75,.05);
}
.upload-zone p { color: var(--text2); font-size: 13px; margin-bottom: 10px; }
.upload-hint { color: var(--text2); font-size: 11px; margin-top: 8px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  transition: background .15s, border-color .15s;
}
.btn:hover { background: var(--surface); border-color: var(--accent); }
.btn-accent {
  background: var(--accent);
  border-color: var(--accent);
  color: #111;
  font-weight: 600;
}
.btn-accent:hover { opacity: .88; background: var(--accent); }

/* ── warning banner ───────────────────────────────────────────────────────── */
.warning {
  background: rgba(224,82,82,.1);
  border: 1px solid var(--red);
  border-radius: var(--radius);
  padding: 10px 16px;
  color: var(--red);
  margin-bottom: 14px;
  font-size: 13px;
}

/* ── frames table ─────────────────────────────────────────────────────────── */
.frames-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
  margin-bottom: 48px;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  background: var(--surface);
  padding: 10px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,.03); }
tbody tr.drag-over-row {
  background: rgba(200,168,75,.08);
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}
td { padding: 10px 14px; vertical-align: middle; }

.td-num { width: 40px; text-align: center; font-weight: 700; font-size: 16px; color: var(--accent); }

.td-scan { width: 116px; min-width: 116px; }

.thumb-wrap {
  position: relative;
  width: 104px;
  height: 78px;
  cursor: grab;
}
.thumb-wrap:active { cursor: grabbing; }
.thumb-wrap img {
  width: 104px;
  height: 78px;
  object-fit: cover;
  border-radius: 4px;
  border: 1px solid var(--border);
  display: block;
  cursor: zoom-in;
}
.thumb-filename {
  font-size: 10px;
  color: var(--text2);
  margin-top: 3px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 104px;
}
.empty-slot {
  width: 104px;
  height: 78px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--border);
  font-size: 24px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.empty-slot:hover { border-color: var(--accent); color: var(--accent); }

.td-time { white-space: nowrap; }
.td-time .date { color: var(--text); }
.td-time .time { color: var(--text2); font-size: 12px; }

.td-loc { white-space: nowrap; }
.td-loc a { font-size: 12px; display: flex; align-items: center; gap: 4px; }
.td-loc .dash { color: var(--border); }

.td-note { max-width: 220px; color: var(--text2); font-size: 13px; }
.td-note .dash { color: var(--border); }

/* ── landing (no URL data) ────────────────────────────────────────────────── */
.landing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 65vh;
  text-align: center;
  padding: 40px 20px;
}
.landing-logo { font-size: 42px; margin-bottom: 20px; }
.landing h1 { font-size: 26px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.landing p { color: var(--text2); max-width: 500px; line-height: 1.75; margin-bottom: 10px; }
.landing .step {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  margin-top: 6px;
  font-size: 13px;
  color: var(--text2);
  text-align: left;
  max-width: 420px;
  width: 100%;
}
.landing .step strong { color: var(--text); }

/* ── lightbox ─────────────────────────────────────────────────────────────── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.93);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  object-fit: contain;
  border-radius: 4px;
  cursor: default;
}
.lightbox-close {
  position: absolute;
  top: 16px;
  right: 22px;
  font-size: 26px;
  color: #fff;
  cursor: pointer;
  line-height: 1;
  opacity: .7;
}
.lightbox-close:hover { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="container topbar-inner">
    <span class="logo">FilmTrack</span>
    <span class="topbar-sep">|</span>
    <span class="topbar-sub">Roll Matcher</span>
  </div>
</div>

<div class="container" id="app"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<!-- Hidden global file input for bulk upload -->
<input type="file" id="fileInput" multiple accept="image/*"
       style="display:none" onchange="handleFiles(this.files)">

<script>
'use strict';

// ── State ──────────────────────────────────────────────────────────────────────
let rollData    = null;   // { v, roll, frames[] }
let photos      = [];     // [{ file, url, name }]  sorted by filename
let assignments = [];     // assignments[frameIdx] = photoIdx | null
let dragSrc     = null;   // frameIdx being dragged

// ── Boot ───────────────────────────────────────────────────────────────────────
(async function init() {
  const params  = new URLSearchParams(location.search);
  const encoded = params.get('d');
  if (!encoded) { renderLanding(); return; }
  try {
    const json = await decode(encoded);
    rollData    = JSON.parse(json);
    assignments = new Array(rollData.frames.length).fill(null);
    render();
  } catch (e) {
    console.error(e);
    renderError('Could not read roll data from this URL. Make sure you opened the exact link generated by the FilmTrack app.');
  }
})();

// ── Decompress base64url(zlib) → string ───────────────────────────────────────
async function decode(encoded) {
  // base64url → standard base64 + padding
  const b64    = encoded.replace(/-/g, '+').replace(/_/g, '/');
  const padded = b64 + '=='.slice(0, (4 - b64.length % 4) % 4);
  const bin    = atob(padded);
  const bytes  = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

  // decompress zlib (deflate with header — matches Java Deflater nowrap=false)
  const ds     = new DecompressionStream('deflate');
  const writer = ds.writable.getWriter();
  writer.write(bytes);
  writer.close();

  const chunks = [];
  const reader = ds.readable.getReader();
  for (;;) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
  }
  const total = chunks.reduce((s, c) => s + c.length, 0);
  const out   = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return new TextDecoder().decode(out);
}

// ── File handling ──────────────────────────────────────────────────────────────
function handleFiles(fileList) {
  const added = Array.from(fileList)
    .filter(f => f.type.startsWith('image/'))
    .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }));

  const startIdx = photos.length;
  added.forEach(f => photos.push({ file: f, url: URL.createObjectURL(f), name: f.name }));

  // Auto-assign newly added photos into empty frame slots in order
  let pi = startIdx;
  for (let fi = 0; fi < assignments.length && pi < photos.length; fi++) {
    if (assignments[fi] === null) { assignments[fi] = pi++; }
  }

  render();
}

// ── Drag & drop between frame rows ────────────────────────────────────────────
function rowDragStart(e, fi) {
  if (assignments[fi] === null) { e.preventDefault(); return; }
  dragSrc = fi;
  e.dataTransfer.effectAllowed = 'move';
}
function rowDragOver(e, fi) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  clearDragHighlights();
  document.getElementById('row-' + fi)?.classList.add('drag-over-row');
}
function rowDrop(e, fi) {
  e.preventDefault();
  clearDragHighlights();
  if (dragSrc === null || dragSrc === fi) { dragSrc = null; return; }
  // swap
  [assignments[fi], assignments[dragSrc]] = [assignments[dragSrc], assignments[fi]];
  dragSrc = null;
  renderTable();
}
function rowDragEnd() { dragSrc = null; clearDragHighlights(); }
function clearDragHighlights() {
  document.querySelectorAll('.drag-over-row').forEach(r => r.classList.remove('drag-over-row'));
}

// Allow dropping files from OS onto individual slots (fills that slot)
function slotDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; }
function slotDrop(e, fi) {
  e.preventDefault();
  e.stopPropagation();
  if (e.dataTransfer.files.length) {
    const f = e.dataTransfer.files[0];
    if (!f.type.startsWith('image/')) return;
    const pi = photos.length;
    photos.push({ file: f, url: URL.createObjectURL(f), name: f.name });
    assignments[fi] = pi;
    renderTable();
  }
}

// Click empty slot → file picker for that one slot
function pickForSlot(fi) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    if (!inp.files.length) return;
    const f  = inp.files[0];
    const pi = photos.length;
    photos.push({ file: f, url: URL.createObjectURL(f), name: f.name });
    assignments[fi] = pi;
    renderTable();
  };
  inp.click();
}

// ── Upload zone wiring ─────────────────────────────────────────────────────────
function wireUploadZone() {
  const zone = document.getElementById('uploadZone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });
  zone.addEventListener('click', e => {
    if (e.target.closest('button')) return; // let button handle its own click
    document.getElementById('fileInput').click();
  });
}

// ── Lightbox ───────────────────────────────────────────────────────────────────
function openLightbox(url, name) {
  const img = document.getElementById('lightboxImg');
  img.src = url; img.alt = name;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Format helpers ─────────────────────────────────────────────────────────────
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
function mapsUrl(lat, lng) {
  return 'https://www.google.com/maps/search/?api=1&query=' + lat + ',' + lng;
}
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── Render: full page ──────────────────────────────────────────────────────────
function render() {
  if (!rollData) { renderLanding(); return; }

  const roll   = rollData.roll;
  const frames = rollData.frames;
  const matched = assignments.filter(a => a !== null).length;
  const mismatch = photos.length > 0 && photos.length !== frames.length;

  const chipDate = ts => new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

  let chips = [];
  if (roll.filmStock) chips.push('🎞\u2006' + esc(roll.filmStock));
  if (roll.camera)    chips.push('📷\u2006' + esc(roll.camera));
  if (roll.iso)       chips.push('ISO\u00a0' + esc(roll.iso));
  if (roll.dateStarted) chips.push('📅\u2006Started\u00a0' + chipDate(roll.dateStarted));
  if (roll.dateFinished) chips.push('✅\u2006Finished\u00a0' + chipDate(roll.dateFinished));

  document.getElementById('app').innerHTML = `
    <div class="roll-header">
      <div>
        <div class="roll-name">${esc(roll.name)}</div>
        <div class="roll-chips">${chips.map(c => `<span>${c}</span>`).join('')}</div>
      </div>
      <div class="match-count">
        <div class="num" id="matchNum">${matched}/${frames.length}</div>
        <div class="lbl">scans matched</div>
      </div>
    </div>

    ${mismatch ? `<div class="warning">
      ⚠ ${photos.length} photo${photos.length !== 1 ? 's' : ''} uploaded but this roll has
      ${frames.length} frame${frames.length !== 1 ? 's' : ''} — auto-order may not be exact.
      Drag rows to re-assign.
    </div>` : ''}

    <div class="upload-zone" id="uploadZone">
      <p>${photos.length > 0
        ? `${photos.length} scan${photos.length !== 1 ? 's' : ''} loaded — drop more to add, or drag rows to reorder`
        : 'Drop your scanned photos here — they'll be matched to frames by filename order'}</p>
      <button class="btn btn-accent"
              onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
        📁 ${photos.length > 0 ? 'Add More Scans' : 'Browse Scans'}
      </button>
      <p class="upload-hint">Photos never leave your device · drag thumbnails between rows to reorder</p>
    </div>

    <div class="frames-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Scan</th>
            <th>Date / Time</th>
            <th>Location</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="framesBody"></tbody>
      </table>
    </div>
  `;

  wireUploadZone();
  renderTable();
}

// ── Render: just the table body (after drag/assign changes) ───────────────────
function renderTable() {
  if (!rollData) return;
  const frames  = rollData.frames;
  const matched = assignments.filter(a => a !== null).length;

  const numEl = document.getElementById('matchNum');
  if (numEl) numEl.textContent = matched + '/' + frames.length;

  const tbody = document.getElementById('framesBody');
  if (!tbody) return;

  tbody.innerHTML = frames.map((frame, fi) => {
    const pi    = assignments[fi];
    const photo = pi !== null ? photos[pi] : null;

    const scanCell = photo ? `
      <div class="thumb-wrap"
           draggable="true"
           ondragstart="rowDragStart(event,${fi})"
           ondragover="rowDragOver(event,${fi})"
           ondrop="rowDrop(event,${fi})"
           ondragend="rowDragEnd()">
        <img src="${esc(photo.url)}" alt="${esc(photo.name)}"
             title="${esc(photo.name)}"
             onclick="openLightbox('${esc(photo.url)}','${esc(photo.name)}')">
      </div>
      <div class="thumb-filename" title="${esc(photo.name)}">${esc(photo.name)}</div>
    ` : `
      <div class="empty-slot"
           ondragover="slotDragOver(event)"
           ondrop="slotDrop(event,${fi})"
           onclick="pickForSlot(${fi})"
           title="Click or drop a photo here">＋</div>
    `;

    const locCell = (frame.lat != null && frame.lng != null) ? `
      <a href="${esc(mapsUrl(frame.lat, frame.lng))}" target="_blank" rel="noopener noreferrer">
        📍 ${frame.lat.toFixed(4)}, ${frame.lng.toFixed(4)}
      </a>
    ` : `<span class="dash">—</span>`;

    const noteCell = frame.note
      ? `<span title="${esc(frame.note)}">${esc(frame.note)}</span>`
      : `<span class="dash">—</span>`;

    return `
      <tr id="row-${fi}">
        <td class="td-num">${frame.n}</td>
        <td class="td-scan">${scanCell}</td>
        <td class="td-time">
          <div class="date">${fmtDate(frame.ts)}</div>
          <div class="time">${fmtTime(frame.ts)}</div>
        </td>
        <td class="td-loc">${locCell}</td>
        <td class="td-note">${noteCell}</td>
      </tr>`;
  }).join('');
}

// ── Landing page (no URL param) ────────────────────────────────────────────────
function renderLanding() {
  document.getElementById('app').innerHTML = `
    <div class="landing">
      <div class="landing-logo">🎞</div>
      <h1>FilmTrack Roll Matcher</h1>
      <p>Match your developed scans to the frame data captured on your phone —
         timestamps, GPS locations, and notes — all without uploading anything.</p>
      <div class="step"><strong>1.</strong> Open a roll in the <strong>FilmTrack</strong> Android app</div>
      <div class="step"><strong>2.</strong> Tap the <strong>Share</strong> button in the top bar</div>
      <div class="step"><strong>3.</strong> Open the link on this device and drop your scans onto the page</div>
      <p style="margin-top:20px; font-size:12px;">
        Roll data is encoded directly in the URL. No servers, no accounts, no uploads.
      </p>
    </div>
  `;
}

function renderError(msg) {
  document.getElementById('app').innerHTML = `
    <div class="landing">
      <div class="landing-logo" style="font-size:36px">⚠</div>
      <h1 style="color:var(--red)">Couldn't load roll</h1>
      <p>${esc(msg)}</p>
    </div>
  `;
}
</script>
</body>
</html>
