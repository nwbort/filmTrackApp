name: Generate Project Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore filmtrack.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias filmtrack \
            -storepass filmtrack123 \
            -keypass filmtrack123 \
            -dname "CN=FilmTrack, O=Dev, C=US" \
            -noprompt
          base64 -w 0 filmtrack.jks > filmtrack_base64.txt

      - name: Upload base64 keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore-setup
          path: filmtrack_base64.txt
          retention-days: 1
